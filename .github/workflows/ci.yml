name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  control-plane:
    name: typecheck · test · build · bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Typecheck (all workspaces, strict)
        run: npm run typecheck

      - name: Unit + invariant tests (control-plane core)
        run: npm run test -w @continuum/core

      - name: DB isolation + durability gate (embedded Postgres, RLS)
        run: npm run test -w @continuum/persistence

      - name: Build console
        run: npm run build -w @continuum/console

      - name: Start control plane
        run: |
          npm run start -w @continuum/console &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4311/api/state >/dev/null; then break; fi
            sleep 1
          done

      - name: SIF-Bench gate (fails the build on any gate failure)
        run: python3 research/sif-bench/sif_bench.py --iterations 30

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sif-bench-report
          path: research/sif-bench/results/report.json
          if-no-files-found: ignore
